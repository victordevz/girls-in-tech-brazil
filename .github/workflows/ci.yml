name: CI - Validacao de PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate creator data
        run: npm run validate:ci

      - name: Run lint
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      - name: Build application
        run: npm run build
